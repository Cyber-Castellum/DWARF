{
  "spec_version": "v1",
  "id": "amaru-cbor-tx-body-fuzz",
  "title": "Library-tier CBOR fuzz of amaru tx-body parser",
  "authors": [
    "dwarf"
  ],
  "tags": [
    "ser-deser",
    "parser",
    "fuzz",
    "amaru",
    "tx-body"
  ],
  "target": {
    "implementation": "amaru",
    "version": "any"
  },
  "runtime": "library",
  "seed": "0xCAFE0001",
  "load": [
    {
      "primitive": "cbor_fuzz_target",
      "target_id": "amaru-cbor-decode-tx-body",
      "manifests_dir": "${HOME}/dwarf-shims/manifests",
      "iterations": 10000,
      "min_bytes": 1,
      "max_bytes": 4096,
      "per_input_timeout_seconds": 2
    }
  ],
  "probes": [
    {
      "primitive": "parser_exit_status"
    }
  ],
  "assertions": [
    {
      "primitive": "parse_succeeds_or_clean_error"
    },
    {
      "primitive": "roundtrip_equals_original"
    }
  ],
  "teardown": []
}