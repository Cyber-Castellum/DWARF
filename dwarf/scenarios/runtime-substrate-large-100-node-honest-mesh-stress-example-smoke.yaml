{
  "spec_version": "v1",
  "id": "runtime-substrate-large-100-node-honest-mesh-stress-example-smoke",
  "title": "Large-N 100-node honest mesh stress on the current fleet envelope (aspirational, 96 GiB+ and observation summarization required)",
  "authors": [
    "dwarf"
  ],
  "tags": [
    "substrate",
    "large-n",
    "honest-mesh",
    "three-host-fanout",
    "fleet-expansion-required",
    "aspirational",
    "ram-96gib"
  ],
  "related_milestones": [
    "M2"
  ],
  "evidence_intent": "risk-support",
  "promotion_blockers": [
    "spark is aarch64 and current dwarf/cardano-node:10.7.1 image is amd64-only",
    "current three-host fleet does not have enough aggregate RAM headroom for a 100-node mesh under observation",
    "runtime_multi_node_observation needs summarization or sharding for 100-node campaigns"
  ],
