{
  "spec_version": "v1",
  "id": "runtime-substrate-checkpoint-capture-clean-example-smoke",
  "title": "Compose a preview substrate and record a full substrate checkpoint",
  "authors": [
    "dwarf"
  ],
  "tags": [
    "substrate",
    "checkpoint",
    "recovery"
  ],
  "target": {
    "implementation": "cardano-node",
    "version": "10.7.1"
  },
  "runtime": "devnet",
  "substrate": {
    "network": "preview",
    "nodes": [
      {
        "id": "node1",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      },
      {
        "id": "node2",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      }
    ],
    "topology": {
      "edges": [
        {
          "from": "node1",
          "to": "node2"
        },
        {
          "from": "node2",
          "to": "node1"
        }
      ]
    }
  },
  "setup": [
    {
      "primitive": "runtime_install_version",
      "output_dir": "outputs/substrate-install"
    },
    {
      "primitive": "runtime_compose_substrate",
      "output_dir": "outputs/substrate-compose",
      "healthy_timeout_seconds": 180,
      "timeout_seconds": 420
    }
  ],
  "load": [
    {
      "primitive": "runtime_substrate_checkpoint",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "output_dir": "outputs/substrate-checkpoint",
      "healthy_timeout_seconds": 120
    }
  ],
  "assertions": [
    {
      "primitive": "all_nodes_started_clean",
      "min_completed": 1,
      "min_node_count": 2
    },
    {
      "primitive": "substrate_checkpoint_recorded_clean"
    }
  ],
  "teardown": [
    {
      "primitive": "runtime_teardown_substrate",
      "output_dir": "outputs/substrate-teardown"
    }
  ]
}
