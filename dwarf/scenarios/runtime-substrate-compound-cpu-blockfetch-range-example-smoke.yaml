{
  "spec_version": "v1",
  "id": "runtime-substrate-compound-cpu-blockfetch-range-example-smoke",
  "title": "Exercise BlockFetch range pressure while host-managed CPU pressure is active",
  "authors": [
    "dwarf"
  ],
  "tags": [
    "substrate",
    "compound",
    "cpu",
    "resource-abuse",
    "blockfetch",
    "tm-005",
    "m2"
  ],
  "target": {
    "implementation": "cardano-node",
    "version": "10.7.1"
  },
  "runtime": "devnet",
  "substrate": {
    "network": "preview",
    "nodes": [
      {
        "id": "node1",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      },
      {
        "id": "node2",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      }
    ],
    "topology": {
      "edges": [
        {
          "from": "node1",
          "to": "node2"
        },
        {
          "from": "node2",
          "to": "node1"
        }
      ]
    }
  },
  "setup": [
    {
      "primitive": "runtime_install_version",
      "output_dir": "outputs/substrate-install"
    },
    {
      "primitive": "runtime_compose_substrate",
      "output_dir": "outputs/substrate-compose"
    }
  ],
  "load": [
    {
      "primitive": "load_shell_command",
      "timeout_seconds": 15,
      "command": "OUT=\"$ADA2_DWARF_RUN_DIR/outputs/cpu-pressure\"; mkdir -p \"$OUT\"; PIDS=\"\"; for i in 1 2 3 4; do python3 - <<'PY' >/dev/null 2>&1 &\nimport time\nend = time.time() + 20\nx = 0\nwhile time.time() < end:\n    x = (x + 3) % 1000003\nPY\nPIDS=\"$PIDS $!\"; done; echo \"$PIDS\" > \"$OUT/stressor.pids\"; sleep 1; ps -o pid=,pcpu=,comm= -p $PIDS"
    },
    {
      "primitive": "runtime_blockfetch_range_pressure",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "target_node": "node1",
      "output_dir": "outputs/blockfetch-range-pressure"
    },
    {
      "primitive": "runtime_multi_node_observation",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "node_ids": [
        "node1",
        "node2"
      ],
      "observation_window_seconds": 10,
      "sample_interval_seconds": 1,
      "network_magic": 42,
      "observation_primitives": [
        "tip_state",
        "connection_state"
      ],
      "output_dir": "outputs/multi-node-observation"
    },
    {
      "primitive": "load_shell_command",
      "timeout_seconds": 15,
      "command": "OUT=\"$ADA2_DWARF_RUN_DIR/outputs/cpu-pressure\"; PIDFILE=\"$OUT/stressor.pids\"; if [ -f \"$PIDFILE\" ]; then for PID in $(cat \"$PIDFILE\"); do kill \"$PID\" 2>/dev/null || true; done; rm -f \"$PIDFILE\"; fi; echo cleanup-complete"
    }
  ],
  "assertions": [
    {
      "primitive": "all_nodes_started_clean",
      "min_completed": 1,
      "min_node_count": 2
    },
    {
      "primitive": "all_nodes_responsive"
    },
    {
      "primitive": "blockfetch_range_pressure_bounded"
    }
  ],
  "teardown": [
    {
      "primitive": "runtime_teardown_substrate",
      "output_dir": "outputs/substrate-teardown"
    }
  ]
}
