{
  "spec_version": "v1",
  "id": "phase3-runtime-generated-haskell3-node2-freeze-recover-primitive",
  "title": "Declarative runtime primitive for generated-profile node2 freeze and recovery verification",
  "authors": ["dwarf"],
  "tags": ["phase3", "runtime", "primitive", "generated-profile", "node-freeze", "node-recovery", "multi-phase"],
  "related_milestones": ["M3"],
  "target": {"implementation": "cardano-node", "version": "any"},
  "runtime": "devnet",
  "profile": "profile-i-generated-haskell3",
  "phases": [
    {
      "id": "freeze-node2",
      "title": "Freeze node2 and verify node1/node3 stay healthy",
      "faults": [
        {
          "primitive": "fault_node_freeze",
          "runtime_metadata_path": "/home/nigel/cardano-profiles/profile-i-generated-haskell3/runtime.json",
          "target_node": "node2"
        }
      ],
      "load": [
        {
          "primitive": "runtime_generated_node_freeze_check",
          "runtime_root": "/home/nigel/cardano-profiles/profile-i-generated-haskell3",
          "blocked_node": "node2",
          "healthy_nodes": ["node1", "node3"],
          "sample_seconds": 2,
          "timeout_seconds": 60,
          "expected_helper_exit": 0
        }
      ],
      "assertions": [{"primitive": "load_events_are_ok", "min_completed": 1}]
    },
    {
      "id": "recover-node2",
      "title": "Verify node2 resumed after the freeze phase",
      "load": [
        {
          "primitive": "runtime_generated_node_recovery_check",
          "runtime_root": "/home/nigel/cardano-profiles/profile-i-generated-haskell3",
          "recovered_node": "node2",
          "healthy_nodes": ["node1", "node3"],
          "required_phase_id": "freeze-node2",
          "sample_seconds": 2,
          "timeout_seconds": 60,
          "expected_helper_exit": 0
        }
      ],
      "assertions": [{"primitive": "load_events_are_ok", "min_completed": 1}]
    }
  ]
}
