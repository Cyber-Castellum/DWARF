{
  "spec_version": "v1",
  "id": "runtime-substrate-compound-panic-bootstrap-example-smoke",
  "title": "Compose a substrate scenario that combines bootstrap-assumption pressure with panic-path containment",
  "authors": ["dwarf"],
  "tags": ["substrate", "compound", "bootstrap", "panic", "rr-023", "rr-026"],
  "target": {"implementation": "cardano-node", "version": "10.7.1"},
  "runtime": "devnet",
  "substrate": {
    "network": "preview",
    "nodes": [
      {"id": "node1", "impl": "cardano-node", "version": "10.7.1", "role": "honest"},
      {"id": "node2", "impl": "cardano-node", "version": "10.7.1", "role": "honest"}
    ],
    "topology": {
      "edges": [
        {"from": "node1", "to": "node2"},
        {"from": "node2", "to": "node1"}
      ]
    }
  },
  "setup": [
    {"primitive": "runtime_install_version", "output_dir": "outputs/substrate-install"},
    {"primitive": "runtime_compose_substrate", "output_dir": "outputs/substrate-compose"}
  ],
  "load": [
    {"primitive": "runtime_bootstrap_assumption_probe", "runtime_metadata_path": "outputs/substrate-compose/runtime.json", "target_node": "node1", "output_dir": "outputs/bootstrap-assumptions"},
    {"primitive": "runtime_panic_path_probe", "runtime_metadata_path": "outputs/substrate-compose/runtime.json", "target_node": "node1", "output_dir": "outputs/panic-path"},
    {
      "primitive": "runtime_multi_node_observation",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "node_ids": ["node1", "node2"],
      "observation_window_seconds": 10,
      "sample_interval_seconds": 1,
      "network_magic": 42,
      "observation_primitives": ["tip_state", "connection_state"],
      "output_dir": "outputs/multi-node-observation"
    }
  ],
  "probes": [],
  "assertions": [
    {"primitive": "all_nodes_responsive"},
    {"primitive": "bootstrap_assumptions_safe"},
    {"primitive": "panic_path_contained"}
  ],
  "teardown": [
    {"primitive": "runtime_teardown_substrate", "output_dir": "outputs/substrate-teardown"}
  ]
}
