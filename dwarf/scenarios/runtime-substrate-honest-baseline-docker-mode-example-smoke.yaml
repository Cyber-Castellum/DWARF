{
  "spec_version": "v1",
  "id": "runtime-substrate-honest-baseline-docker-mode-example-smoke",
  "title": "Compose an honest two-node Docker substrate and assert the operational smoke baseline",
  "authors": [
    "dwarf"
  ],
  "tags": [
    "substrate",
    "observation",
    "baseline",
    "docker"
  ],
  "target": {
    "implementation": "cardano-node",
    "version": "10.7.1",
    "profile": "honest-substrate-baseline-docker",
    "invariants": [
      "honest nodes converge to one tip",
      "honest nodes establish peer edges",
      "honest nodes remain responsive",
      "honest nodes chain-select consistently"
    ]
  },
  "runtime": "devnet",
  "seed": "0xD0C0E042",
  "substrate": {
    "compose_mode": "docker",
    "network": "testnet_42",
    "nodes": [
      {
        "id": "node1",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      },
      {
        "id": "node2",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      }
    ],
    "topology": {
      "edges": [
        {
          "from": "node1",
          "to": "node2"
        },
        {
          "from": "node2",
          "to": "node1"
        }
      ]
    }
  },
  "setup": [
    {
      "primitive": "runtime_install_version",
      "output_dir": "outputs/substrate-install"
    },
    {
      "primitive": "runtime_compose_substrate",
      "output_dir": "outputs/substrate-compose",
      "healthy_timeout_seconds": 240,
      "timeout_seconds": 420
    }
  ],
  "load": [
    {
      "primitive": "runtime_multi_node_observation",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "node_ids": [
        "node1",
        "node2"
      ],
      "observation_window_seconds": 10,
      "sample_interval_seconds": 1,
      "network_magic": 42,
      "observation_primitives": [
        "tip_state",
        "connection_state"
      ],
      "output_dir": "outputs/multi-node-observation"
    }
  ],
  "probes": [],
  "assertions": [
    {
      "primitive": "all_nodes_started_clean",
      "min_completed": 1,
      "min_node_count": 2
    },
    {
      "primitive": "peer_connectivity_observed",
      "timeout_seconds": 10
    },
    {
      "primitive": "all_nodes_responsive"
    }
  ],
  "teardown": [
    {
      "primitive": "runtime_teardown_substrate",
      "output_dir": "outputs/substrate-teardown"
    }
  ]
}
