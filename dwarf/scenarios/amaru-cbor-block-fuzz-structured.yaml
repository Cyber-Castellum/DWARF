              {"type": "bytes", "length": 32},
              {"type": "bytes", "length": 32},
              {"type": "bytes", "length": 32},
              {"type": "array", "elements": [
                {"type": "bytes", "length": 32},
                {"type": "bytes", "length": 80}
              ]},
              {"type": "uint", "max": 90112},
              {"type": "bytes", "length": 32},
              {"type": "array", "elements": [
                {"type": "bytes", "length": 32},
                {"type": "uint", "max": 100},
                {"type": "uint", "max": 100},
                {"type": "bytes", "length": 64}
              ]},
              {"type": "array", "elements": [
                {"type": "uint", "max": 10},
                {"type": "uint", "max": 1000}
              ]}
            ]},
            {"type": "bytes", "length": 448}
          ]},
          {"type": "array", "elements": []},
          {"type": "array", "elements": []},
          {"type": "map", "entries": []},
          {"type": "array", "elements": []}
        ]
      }
    }
  ],
  "probes": [{"primitive": "parser_exit_status"}],
  "assertions": [
    {"primitive": "parse_succeeds_or_clean_error"},
    {"primitive": "roundtrip_equals_original"}
  ],
  "teardown": []
}
