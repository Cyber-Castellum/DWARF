  "target": {"implementation": "cardano-node", "version": "any"},
  "runtime": "devnet",
  "profile": "profile-a-haskell-peersharing-disabled",
  "seed": "0xC0DE5031",
  "phases": [
    {
      "id": "observability-log-baseline-before-fault",
      "title": "Capture the pre-fault log baseline",
      "load": [
        {
          "primitive": "runtime_observability_log_baseline",
          "timeout_seconds": 120,
          "expected_helper_exit": 0
        }
      ],
      "assertions": [{"primitive": "load_events_are_ok", "min_completed": 1}]
    },
    {
      "id": "observability-trace-settings-before-fault",
      "title": "Capture the pre-fault trace settings baseline",
      "load": [
        {
          "primitive": "runtime_observability_trace_settings_baseline",
          "timeout_seconds": 120,
          "expected_helper_exit": 0
        }
      ],
      "assertions": [{"primitive": "load_events_are_ok", "min_completed": 1}]
    },
    {
      "id": "blockfetch-port-drop-timeout",
      "title": "Blackhole node1 and observe a bounded BlockFetch timeout",
      "faults": [
        {
          "primitive": "fault_local_port_drop",
          "runtime_metadata_path": "${HOME}/cardano-profiles/profile-a-haskell-peersharing-disabled/runtime.json",
          "target_node": "node1",
          "host": "127.0.0.1"
        }
      ],
      "load": [
        {
          "primitive": "runtime_blockfetch_drop_timeout",
          "timeout_seconds": 60,
          "expected_helper_exit": 0
        }
      ],
      "assertions": [{"primitive": "load_events_are_ok", "min_completed": 1}]
    },
    {
      "id": "observability-log-baseline-after-fault",
      "title": "Recheck log baseline after fault cleanup",
      "load": [
        {
          "primitive": "runtime_observability_log_baseline",
          "timeout_seconds": 120,
          "expected_helper_exit": 0
        }
      ],
      "assertions": [{"primitive": "load_events_are_ok", "min_completed": 1}]
    }
  ]
