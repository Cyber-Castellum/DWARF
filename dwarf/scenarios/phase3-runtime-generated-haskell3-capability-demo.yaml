          "command": "python3 - <<'PY'\nimport json\nimport socket\nimport sys\nimport time\nfrom pathlib import Path\n\nsys.path.insert(0, '/home/nigel/dwarf-fw/scripts')\nfrom runtime_telemetry import emit_runtime_metric, emit_target_event\n\nruntime_root = Path('/home/nigel/cardano-profiles/profile-i-generated-haskell3')\nruntime = json.loads((runtime_root / 'runtime.json').read_text(encoding='utf-8'))\nnodes = runtime['haskell_nodes']\nstarts = {}\nfor node in nodes:\n    starts[node['name']] = Path(node['log_path']).stat().st_size\n\ntime.sleep(2)\nlistener_passes = 0\nprogress_passes = 0\nfor node in nodes:\n    listener_ok = False\n    try:\n        with socket.create_connection(('127.0.0.1', int(node['port'])), timeout=2):\n            listener_ok = True\n    except OSError:\n        listener_ok = False\n    log_delta_bytes = Path(node['log_path']).stat().st_size - starts[node['name']]\n    emit_target_event(\n        primitive='phase3_capability_demo',\n        event='baseline_probe',\n        payload={\n            'node': node['name'],\n            'port': int(node['port']),\n            'listener_ok': listener_ok,\n            'log_delta_bytes': log_delta_bytes,\n        },\n    )\n    if listener_ok:\n        listener_passes += 1\n    if log_delta_bytes > 0:\n        progress_passes += 1\nif listener_passes != len(nodes):\n    raise SystemExit(f'listener baseline failed: {listener_passes}/{len(nodes)}')\nif progress_passes != len(nodes):\n    raise SystemExit(f'log progress baseline failed: {progress_passes}/{len(nodes)}')\nemit_runtime_metric('phase3_capability_demo_baseline_listener_passes', value=listener_passes)\nemit_runtime_metric('phase3_capability_demo_baseline_progress_passes', value=progress_passes)\nemit_target_event(\n    primitive='phase3_capability_demo',\n    event='baseline_summary',\n    payload={\n        'nodes': [node['name'] for node in nodes],\n        'listener_passes': listener_passes,\n        'progress_passes': progress_passes,\n    },\n)\nprint(f'nodes={len(nodes)} listener_passes={listener_passes} progress_passes={progress_passes}')\nPY",
