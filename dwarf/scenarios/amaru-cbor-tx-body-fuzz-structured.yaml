{
  "spec_version": "v1",
  "id": "amaru-cbor-tx-body-fuzz-structured",
  "title": "Structured-CBOR fuzz of amaru tx-body parser (Conway shape)",
  "authors": ["dwarf"],
  "tags": ["ser-deser", "parser", "fuzz", "structured", "amaru", "tx-body"],
  "target": {"implementation": "amaru", "version": "any"},
  "runtime": "library",
  "seed": "0xCAFE0101",
  "load": [
    {
      "primitive": "cbor_fuzz_structured",
      "target_id": "amaru-cbor-decode-tx-body",
      "manifests_dir": "dwarf/targets/manifests",
      "iterations": 5000,
      "mutation_rate": 0.05,
      "per_input_timeout_seconds": 2,
      "shape": {
        "type": "map",
        "entries": [
          [0, {"type": "array", "elements": [
            {"type": "array", "elements": [
              {"type": "bytes", "length": 32},
              {"type": "uint", "max": 100}
            ]}
          ]}],
          [1, {"type": "array", "elements": [
            {"type": "array", "elements": [
              {"type": "bytes", "length": 57},
              {"type": "uint", "max": 1000000000}
            ]}
          ]}],
          [2, {"type": "uint", "max": 10000000}],
          [3, {"type": "uint", "max": 1000000000}]
        ]
      }
    }
  ],
  "probes": [{"primitive": "parser_exit_status"}],
  "assertions": [
    {"primitive": "parse_succeeds_or_clean_error"},
    {"primitive": "roundtrip_equals_original"}
  ],
  "teardown": []
}
