{
  "spec_version": "v1",
  "id": "runtime-substrate-plutus-phase2-differential-amaru-cardano-node-example-smoke",
  "title": "Compose a host-mode substrate and compare phase-2 Plutus admission behavior across Amaru and cardano-node",
  "authors": ["dwarf"],
  "tags": ["substrate", "plutus", "phase2", "differential", "rr-031", "preauthored"],
  "target": {"implementation": "cardano-node", "version": "10.7.1"},
  "runtime": "devnet",
  "substrate": {
    "compose_mode": "host",
    "network": "preview",
    "nodes": [
      {"id": "node1", "impl": "cardano-node", "version": "10.7.1", "role": "submitter"},
      {"id": "node2", "impl": "cardano-node", "version": "10.7.1", "role": "observer"}
    ],
    "topology": {
      "edges": [
        {"from": "node1", "to": "node2"},
        {"from": "node2", "to": "node1"}
      ]
    }
  },
  "setup": [
    {"primitive": "runtime_install_version", "output_dir": "outputs/substrate-install"},
    {"primitive": "runtime_compose_substrate", "output_dir": "outputs/substrate-compose"}
  ],
  "load": [
    {
      "primitive": "runtime_plutus_phase2_differential_observation",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "target_node": "node1",
      "observer_node": "node2",
      "probe_case": "phase2-differential",
      "output_dir": "outputs/plutus-phase2-differential"
    },
    {
      "primitive": "runtime_multi_node_observation",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "node_ids": ["node1", "node2"],
      "observation_window_seconds": 8,
      "sample_interval_seconds": 1,
      "network_magic": 42,
      "observation_primitives": ["tip_state", "connection_state"],
      "output_dir": "outputs/multi-node-observation"
    }
  ],
  "probes": [],
  "assertions": [
    {"primitive": "all_nodes_responsive"},
    {"primitive": "plutus_phase2_differential_equivalent"}
  ],
  "teardown": [
    {"primitive": "runtime_teardown_substrate", "output_dir": "outputs/substrate-teardown"}
  ]
}
