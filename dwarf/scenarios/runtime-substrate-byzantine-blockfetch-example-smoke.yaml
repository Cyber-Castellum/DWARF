{
  "spec_version": "v1",
  "id": "runtime-substrate-byzantine-blockfetch-example-smoke",
  "title": "Compose a three-node substrate with one malformed BlockFetch peer and assert honest-node isolation",
  "authors": ["dwarf"],
  "tags": ["substrate", "byzantine", "blockfetch", "rr-007"],
  "target": {
    "implementation": "cardano-node",
    "version": "10.7.1",
    "profile": "byzantine-blockfetch-baseline"
  },
  "runtime": "library",
  "seed": "0xB10C0F3D",
  "load": [
    {
      "primitive": "runtime_compose_substrate",
      "implementation": "cardano-node",
      "version": "10.7.1",
      "node_count": 3,
      "output_dir": "outputs/compose-substrate"
    },
    {
      "primitive": "shim_peer_malformed_blockfetch",
      "runtime_metadata_path": "outputs/compose-substrate/runtime.json",
      "target_node": "node3",
      "malformation_id": "invalid-point-hash-short",
      "response_timeout_seconds": 2,
      "receive_bytes": 64
    },
    {
      "primitive": "runtime_multi_node_observation",
      "runtime_metadata_path": "outputs/compose-substrate/runtime.json",
      "node_ids": ["node1", "node2", "node3"],
      "observation_window_seconds": 10,
      "sample_interval_seconds": 1,
      "network_magic": 42,
      "observation_primitives": ["tip_state", "connection_state"],
      "output_dir": "outputs/multi-node-observation"
    }
  ],
  "probes": [],
  "assertions": [
    {"primitive": "load_events_are_ok", "min_completed": 1},
    {
      "primitive": "peer_eviction_within_seconds",
      "honest_node_ids": ["node1", "node2"],
      "byzantine_node_ids": ["node3"],
      "timeout_seconds": 10
    },
    {
      "primitive": "byzantine_isolation_observed",
      "honest_node_ids": ["node1", "node2"],
      "byzantine_node_ids": ["node3"]
    },
    {
      "primitive": "honest_quorum_preserved",
      "honest_node_ids": ["node1", "node2"],
      "minimum_fraction": 1.0
    }
  ],
  "teardown": []
}
