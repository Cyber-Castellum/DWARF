{
  "spec_version": "v1",
  "id": "runtime-substrate-multihost-honest-baseline-example-smoke",
  "title": "Multi-host composed substrate honest baseline smoke",
  "target": {
    "implementation": "cardano-node",
    "version": "10.7.1"
  },
  "runtime": "devnet",
  "substrate": {
    "compose_mode": "docker",
    "host_strategy": "explicit",
    "network": "preview",
    "hosts": [
      {
        "id": "build-host",
        "ssh_target": "build-host",
        "remote_runtime_base": "${HOME}/cardano-profiles",
        "published_host": "192.0.2.1"
      },
      {
        "id": "brabox",
        "ssh_target": "brabox",
        "remote_runtime_base": "${HOME}/cardano-profiles",
        "published_host": "192.0.2.15"
      }
    ],
    "nodes": [
      {
        "id": "node1",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest",
        "host": "build-host"
      },
      {
        "id": "node2",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest",
        "host": "brabox"
      }
    ],
    "topology": {
      "edges": [
        {
          "from": "node1",
          "to": "node2"
        },
        {
          "from": "node2",
          "to": "node1"
        }
      ]
    }
  },
  "setup": [
    {
      "primitive": "runtime_install_version",
      "output_dir": "outputs/substrate-install"
    },
    {
      "primitive": "runtime_compose_substrate",
      "output_dir": "outputs/substrate-compose",
      "healthy_timeout_seconds": 180,
      "timeout_seconds": 420
    }
  ],
  "assertions": [
    {
      "primitive": "all_nodes_started_clean",
      "min_completed": 1,
      "min_node_count": 2
    }
  ],
  "teardown": [
    {
      "primitive": "runtime_teardown_substrate",
      "output_dir": "outputs/substrate-teardown"
    }
  ]
}
