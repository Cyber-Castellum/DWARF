{
  "spec_version": "v1",
  "id": "runtime-substrate-era-transition-example-smoke",
  "title": "Compose an era-transition substrate scenario with HF-boundary observation checks",
  "authors": [
    "dwarf"
  ],
  "tags": [
    "substrate",
    "era-transition",
    "hard-fork",
    "rr-027",
    "rr-028"
  ],
  "target": {
    "implementation": "cardano-node",
    "version": "10.7.1"
  },
  "runtime": "devnet",
  "substrate": {
    "network": "preview",
    "nodes": [
      {
        "id": "node1",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      },
      {
        "id": "node2",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      },
      {
        "id": "node3",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      }
    ],
    "topology": {
      "edges": [
        {
          "from": "node1",
          "to": "node2"
        },
        {
          "from": "node2",
          "to": "node1"
        },
        {
          "from": "node1",
          "to": "node3"
        },
        {
          "from": "node3",
          "to": "node1"
        },
        {
          "from": "node2",
          "to": "node3"
        },
        {
          "from": "node3",
          "to": "node2"
        }
      ]
    }
  },
  "setup": [
    {
      "primitive": "runtime_install_version",
      "output_dir": "outputs/substrate-install"
    },
    {
      "primitive": "runtime_compose_substrate",
      "output_dir": "outputs/substrate-compose"
    }
  ],
  "load": [
    {
      "primitive": "runtime_force_hf_boundary",
      "target_slot": 500,
      "output_dir": "outputs/hf-boundary"
    },
    {
      "primitive": "runtime_simulate_era_transition",
      "window_start_slot": 498,
      "window_end_slot": 502,
      "output_dir": "outputs/era-transition"
    },
    {
      "primitive": "runtime_genesis_mode_simulate",
      "target_node": "node2",
      "output_dir": "outputs/genesis-mode"
    },
    {
      "primitive": "runtime_multi_node_observation",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "node_ids": [
        "node1",
        "node2",
        "node3"
      ],
      "observation_window_seconds": 10,
      "sample_interval_seconds": 1,
      "network_magic": 2,
      "observation_primitives": [
        "tip_state",
        "connection_state"
      ],
      "output_dir": "outputs/multi-node-observation"
    }
  ],
  "probes": [],
  "assertions": [
    {
      "primitive": "all_nodes_started_clean",
      "min_completed": 1,
      "min_node_count": 3
    },
    {
      "primitive": "hf_boundary_rule_consistent"
    },
    {
      "primitive": "transition_window_validated"
    },
    {
      "primitive": "mode_switch_genesis_observed"
    }
  ],
  "teardown": [
    {
      "primitive": "runtime_teardown_substrate",
      "output_dir": "outputs/substrate-teardown"
    }
  ]
}
