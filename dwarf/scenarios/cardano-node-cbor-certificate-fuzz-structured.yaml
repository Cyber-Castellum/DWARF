{
  "spec_version": "v1",
  "id": "cardano-node-cbor-certificate-fuzz-structured",
  "title": "Structured-CBOR fuzz of cardano-node certificate parser (Conway shape)",
  "authors": ["dwarf"],
  "tags": ["ser-deser", "parser", "fuzz", "structured", "cardano-node", "certificate"],
  "target": {"implementation": "cardano-node", "version": "any"},
  "runtime": "library",
  "seed": "0xCAFE0402",
  "load": [
    {
      "primitive": "cbor_fuzz_structured",
      "target_id": "cardano-node-cbor-decode-certificate",
      "manifests_dir": "dwarf/targets/manifests",
      "iterations": 5000,
      "mutation_rate": 0.06,
      "per_input_timeout_seconds": 2,
      "shape": {
        "type": "array",
        "elements": [
          {"type": "uint", "max": 18},
          {"type": "array", "elements": [
            {"type": "uint", "max": 1},
            {"type": "bytes", "length": 28}
          ]}
        ]
      }
    }
  ],
  "probes": [{"primitive": "parser_exit_status"}],
  "assertions": [
    {"primitive": "parse_succeeds_or_clean_error"},
    {"primitive": "roundtrip_equals_original"}
  ],
  "teardown": []
}
