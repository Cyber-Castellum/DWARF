{
  "spec_version": "v1",
  "id": "runtime-substrate-compound-parser-overlay-forging-example-smoke",
  "title": "Compose a substrate scenario that combines parser-bound pressure with overlay-slot forgery pressure",
  "authors": ["dwarf"],
  "tags": ["substrate", "compound", "parser", "tpraos", "rr-024", "rr-030"],
  "target": {"implementation": "cardano-node", "version": "10.7.1"},
  "runtime": "devnet",
  "substrate": {
    "network": "testnet_42",
    "nodes": [
      {"id": "node1", "impl": "cardano-node", "version": "10.7.1", "role": "honest"},
      {"id": "node2", "impl": "cardano-node", "version": "10.7.1", "role": "honest"}
    ],
    "topology": {
      "edges": [
        {"from": "node1", "to": "node2"},
        {"from": "node2", "to": "node1"}
      ]
    }
  },
  "setup": [
    {"primitive": "runtime_install_version", "output_dir": "outputs/substrate-install"},
    {"primitive": "runtime_compose_substrate", "output_dir": "outputs/substrate-compose"}
  ],
  "load": [
    {
      "primitive": "runtime_parser_bounds_probe",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "target_node": "node1",
      "output_dir": "outputs/parser-bounds"
    },
    {
      "primitive": "runtime_overlay_slot_forging",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "target_node": "node1",
      "output_dir": "outputs/overlay-slot-forging"
    },
    {
      "primitive": "runtime_multi_node_observation",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "node_ids": ["node1", "node2"],
      "observation_window_seconds": 10,
      "sample_interval_seconds": 1,
      "network_magic": 42,
      "observation_primitives": ["tip_state", "connection_state", "resource_profile"],
      "output_dir": "outputs/multi-node-observation"
    }
  ],
  "probes": [],
  "assertions": [
    {"primitive": "all_nodes_responsive"},
    {"primitive": "parser_bounds_enforced"},
    {"primitive": "overlay_slot_forging_rejected"}
  ],
  "teardown": [
    {"primitive": "runtime_teardown_substrate", "output_dir": "outputs/substrate-teardown"}
  ]
}
