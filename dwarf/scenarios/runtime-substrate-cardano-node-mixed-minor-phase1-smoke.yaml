{
  "spec_version": "v1",
  "id": "runtime-substrate-cardano-node-mixed-minor-phase1-smoke",
  "title": "Mixed-minor cardano-node substrate phase-1 smoke",
  "target": {
    "implementation": "cardano-node",
    "version": "10.7.1"
  },
  "runtime": "devnet",
  "substrate": {
    "compose_mode": "docker",
    "network": "testnet_42",
    "nodes": [
      {
        "id": "node1",
        "impl": "cardano-node",
        "version": "10.7.1",
        "role": "honest"
      },
      {
        "id": "node2",
        "impl": "cardano-node",
        "version": "10.6.1",
        "role": "honest"
      }
    ],
    "topology": {
      "edges": [
        {
          "from": "node1",
          "to": "node2"
        },
        {
          "from": "node2",
          "to": "node1"
        }
      ]
    }
  },
  "setup": [
    {
      "primitive": "runtime_install_version",
      "output_dir": "outputs/substrate-install"
    },
    {
      "primitive": "runtime_compose_substrate",
      "output_dir": "outputs/substrate-compose",
      "healthy_timeout_seconds": 180,
      "timeout_seconds": 420
    }
  ],
  "load": [
    {
      "primitive": "runtime_multi_node_observation",
      "runtime_metadata_path": "outputs/substrate-compose/runtime.json",
      "output_dir": "outputs/multi-node-observation",
      "node_ids": [
        "node1",
        "node2"
      ],
      "network_magic": 42,
      "observation_window_seconds": 10,
      "sample_interval_seconds": 5,
      "observation_primitives": [
        "tip_state",
        "connection_state"
      ]
    }
  ],
  "assertions": [
    {
      "primitive": "all_nodes_started_clean",
      "min_completed": 1,
      "min_node_count": 2
    },
    {
      "primitive": "all_nodes_responsive",
      "responsive_node_ids": [
        "node1",
        "node2"
      ]
    },
    {
      "primitive": "peer_connectivity_observed",
      "expected_edges": [
        [
          "node1",
          "node2"
        ],
        [
          "node2",
          "node1"
        ]
      ]
    }
  ],
  "teardown": [
    {
      "primitive": "runtime_teardown_substrate",
      "output_dir": "outputs/substrate-teardown"
    }
  ]
}
