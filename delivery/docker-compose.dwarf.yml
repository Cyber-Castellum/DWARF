name: dwarf-june-m2

services:
  dwarf-fw:
    image: ${DWARF_IMAGE:-dwarf/framework:june-20260604-m2}
    container_name: ${DWARF_CONTAINER_NAME:-dwarf-fw-june-m2}
    command:
      - dashboard
      - serve
      - --bind
      - 0.0.0.0
      - --port
      - "8787"
      - --token
      - ${ADA2_DWARF_TOKEN:-dwarf}
    ports:
      - "${DWARF_DASHBOARD_BIND:-0.0.0.0}:${DWARF_DASHBOARD_PORT:-8787}:8787"
    environment:
      ADA2_DWARF_RUNS_DIR: /var/dwarf/runs
      ADA2_DWARF_STATE_DIR: /var/dwarf/state
      ADA2_DWARF_BUNDLES_DIR: /var/dwarf/bundles
      ADA2_PROFILE_MANAGER_CONFIG: /var/dwarf/state/config.yaml
      ADA2_DWARF_TOKEN: ${ADA2_DWARF_TOKEN:-dwarf}
      DWARF_MOOG_ENABLED: ${DWARF_MOOG_ENABLED:-}
      DWARF_MOOG_DEPLOY_ROOT: ${DWARF_MOOG_DEPLOY_ROOT:-}
      DWARF_MOOG_BINARY: ${DWARF_MOOG_BINARY:-}
      DWARF_MOOG_SECRETS_ROOT: ${DWARF_MOOG_SECRETS_ROOT:-}
      DWARF_MOOG_MPFS_HOST: ${DWARF_MOOG_MPFS_HOST:-}
      DWARF_MOOG_TOKEN_ID: ${DWARF_MOOG_TOKEN_ID:-}
      DWARF_MOOG_REQUESTER_WALLET_ID: ${DWARF_MOOG_REQUESTER_WALLET_ID:-}
      DWARF_MOOG_REQUESTER_WALLET_FILE: ${DWARF_MOOG_REQUESTER_WALLET_FILE:-}
      DWARF_MOOG_ORACLE_SERVICE: ${DWARF_MOOG_ORACLE_SERVICE:-}
      MOOG_GITHUB_USER: ${MOOG_GITHUB_USER:-}
      MOOG_GITHUB_REPO: ${MOOG_GITHUB_REPO:-}
      MOOG_GITHUB_PAT: ${MOOG_GITHUB_PAT:-}
      MOOG_TARGET_DIRECTORY: ${MOOG_TARGET_DIRECTORY:-}
      MOOG_TARGET_COMMIT: ${MOOG_TARGET_COMMIT:-}
      MOOG_ASSET_DIR: ${MOOG_ASSET_DIR:-}
      MOOG_DURATION_HOURS: ${MOOG_DURATION_HOURS:-}
      MOOG_ANTITHESIS_LAUNCH_URL: ${MOOG_ANTITHESIS_LAUNCH_URL:-}
      MOOG_ANTITHESIS_USER: ${MOOG_ANTITHESIS_USER:-}
      MOOG_ANTITHESIS_PASSWORD: ${MOOG_ANTITHESIS_PASSWORD:-}
      MOOG_REGISTRY: ${MOOG_REGISTRY:-}
      MOOG_ANTITHESIS_API_KEY: ${MOOG_ANTITHESIS_API_KEY:-}
      MOOG_DOCKER_CONFIG_PATH: ${MOOG_DOCKER_CONFIG_PATH:-}
      MOOG_AGENT_EMAIL_USER: ${MOOG_AGENT_EMAIL_USER:-}
      MOOG_AGENT_EMAIL_PASSWORD: ${MOOG_AGENT_EMAIL_PASSWORD:-}
    volumes:
      - ${DWARF_RUNTIME_ROOT:-../var}/runs:/var/dwarf/runs
      - ${DWARF_RUNTIME_ROOT:-../var}/state:/var/dwarf/state
      - ${DWARF_RUNTIME_ROOT:-../var}/bundles:/var/dwarf/bundles
      - ${DWARF_SSH_KEY_PATH:-${HOME}/.ssh/build-host}:/home/dwarf/.ssh/build-host:ro
      - ${DWARF_SSH_KNOWN_HOSTS:-../var/state/ssh_known_hosts}:/home/dwarf/.ssh/known_hosts:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    restart: unless-stopped
