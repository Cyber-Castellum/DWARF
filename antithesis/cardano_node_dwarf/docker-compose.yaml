x-cardano-node:
  image: ghcr.io/intersectmbo/cardano-node@sha256:5ae211f92eac18ed27b9e2f73c190b56bf4c1a7145d282e78ca58597a385d19f
  environment: &id001
    CARDANO_BLOCK_PRODUCER: true
  command: "run --topology /configs/configs/topology.json\n  --config /configs/configs/config.json\n\
    \  --database-path /state\n  --socket-path /state/node.socket\n  --tracer-socket-path-connect\
    \ /tracer/tracer.socket\n  --shelley-operational-certificate /configs/keys/opcert.cert\n\
    \  --shelley-kes-key /configs/keys/kes.skey\n  --shelley-vrf-key /configs/keys/vrf.skey\n\
    \  --port 3001\n  --host-addr 0.0.0.0\n  +RTS -N -A16m -qg -qb -RTS\n"
  restart: always
  depends_on: &id002
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started
x-cardano-relay:
  environment: &id003
    CARDANO_BLOCK_PRODUCER: false
  command: "run --topology /configs/configs/topology.json\n  --config /configs/configs/config.json\n\
    \  --database-path /state\n  --socket-path /state/node.socket\n  --tracer-socket-path-connect\
    \ /tracer/tracer.socket\n  --port 3001\n  --host-addr 0.0.0.0\n  +RTS -N -A16m\
    \ -qg -qb -RTS\n"
  restart: always
  depends_on: &id004
    configurator:
      condition: service_completed_successfully
    tracer-sidecar:
      condition: service_started
services:
  configurator:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/configurator@sha256:6e6ba428838bf754ad286b62a151c63c683ef27fbdd5dd1bb5bab11ec9a6a34d
    container_name: configurator
    volumes:
    - ./testnet.yaml:/testnet.yaml
    - p1-configs:/configs/1
    - p2-configs:/configs/2
    - p3-configs:/configs/3
    - utxo-keys:/utxo-keys
  tracer:
    image: ghcr.io/intersectmbo/cardano-tracer@sha256:da628263a851b419c38d020d3a7dc3b65b20ee84e730faeb74babd6d96f28efe
    hostname: tracer.example
    container_name: tracer
    labels:
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    volumes:
    - tracer:/opt/cardano-tracer
    - ./tracer-config.yaml:/tracer-config.yaml:ro
    entrypoint: cardano-tracer
    command:
    - --config
    - /tracer-config.yaml
    restart: always
  p1:
    image: ghcr.io/intersectmbo/cardano-node@sha256:5ae211f92eac18ed27b9e2f73c190b56bf4c1a7145d282e78ca58597a385d19f
    environment: *id001
    command: "run --topology /configs/configs/topology.json\n  --config /configs/configs/config.json\n\
      \  --database-path /state\n  --socket-path /state/node.socket\n  --tracer-socket-path-connect\
      \ /tracer/tracer.socket\n  --shelley-operational-certificate /configs/keys/opcert.cert\n\
      \  --shelley-kes-key /configs/keys/kes.skey\n  --shelley-vrf-key /configs/keys/vrf.skey\n\
      \  --port 3001\n  --host-addr 0.0.0.0\n  +RTS -N -A16m -qg -qb -RTS\n"
    restart: always
    depends_on: *id002
    container_name: p1
    hostname: p1.example
    volumes:
    - p1-configs:/configs:ro
    - tracer:/tracer
  p2:
    image: ghcr.io/intersectmbo/cardano-node@sha256:c3cbc5aa0b758ba211567791539a67001e661fbe7a09275e37449e8b1252c4b2
    environment: *id001
    command: "run --topology /configs/configs/topology.json\n  --config /configs/configs/config.json\n\
      \  --database-path /state\n  --socket-path /state/node.socket\n  --tracer-socket-path-connect\
      \ /tracer/tracer.socket\n  --shelley-operational-certificate /configs/keys/opcert.cert\n\
      \  --shelley-kes-key /configs/keys/kes.skey\n  --shelley-vrf-key /configs/keys/vrf.skey\n\
      \  --port 3001\n  --host-addr 0.0.0.0\n  +RTS -N -A16m -qg -qb -RTS\n"
    restart: always
    depends_on: *id002
    container_name: p2
    hostname: p2.example
    volumes:
    - p2-configs:/configs:ro
    - tracer:/tracer
  p3:
    image: ghcr.io/intersectmbo/cardano-node@sha256:45857be8d86b314a05cd46d310b74b24e5f5870469f90c6464994a7f78142271
    environment: *id001
    command: "run --topology /configs/configs/topology.json\n  --config /configs/configs/config.json\n\
      \  --database-path /state\n  --socket-path /state/node.socket\n  --tracer-socket-path-connect\
      \ /tracer/tracer.socket\n  --shelley-operational-certificate /configs/keys/opcert.cert\n\
      \  --shelley-kes-key /configs/keys/kes.skey\n  --shelley-vrf-key /configs/keys/vrf.skey\n\
      \  --port 3001\n  --host-addr 0.0.0.0\n  +RTS -N -A16m -qg -qb -RTS\n"
    restart: always
    depends_on: *id002
    container_name: p3
    hostname: p3.example
    volumes:
    - p3-configs:/configs:ro
    - tracer:/tracer
  relay1:
    environment: *id003
    command: "run --topology /configs/configs/topology.json\n  --config /configs/configs/config.json\n\
      \  --database-path /state\n  --socket-path /state/node.socket\n  --tracer-socket-path-connect\
      \ /tracer/tracer.socket\n  --port 3001\n  --host-addr 0.0.0.0\n  +RTS -N -A16m\
      \ -qg -qb -RTS\n"
    restart: always
    depends_on: *id004
    image: ghcr.io/intersectmbo/cardano-node@sha256:c3cbc5aa0b758ba211567791539a67001e661fbe7a09275e37449e8b1252c4b2
    container_name: relay1
    hostname: relay1.example
    volumes:
    - p1-configs:/configs:ro
    - ./relay-topology.json:/configs/configs/topology.json:ro
    - relay1-state:/state
    - tracer:/tracer
  relay2:
    environment: *id003
    command: "run --topology /configs/configs/topology.json\n  --config /configs/configs/config.json\n\
      \  --database-path /state\n  --socket-path /state/node.socket\n  --tracer-socket-path-connect\
      \ /tracer/tracer.socket\n  --port 3001\n  --host-addr 0.0.0.0\n  +RTS -N -A16m\
      \ -qg -qb -RTS\n"
    restart: always
    depends_on:
      configurator:
        condition: service_completed_successfully
      tracer-sidecar:
        condition: service_started
      dwarf-adversary:
        condition: service_started
    image: ghcr.io/intersectmbo/cardano-node@sha256:45857be8d86b314a05cd46d310b74b24e5f5870469f90c6464994a7f78142271
    container_name: relay2
    hostname: relay2.example
    volumes:
    - p1-configs:/configs:ro
    - ./relay-dwarf-topology.json:/configs/configs/topology.json:ro
    - relay2-state:/state
    - tracer:/tracer
  dwarf-adversary:
    image: ghcr.io/j-gainsec/dwarf-adversary:0.18.0
    container_name: dwarf-adversary
    hostname: dwarf-adversary.example
    labels:
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    command:
    - --network-magic
    - '42'
    - --listen-port
    - '3001'
    - --mutation-rate
    - '0.5'
    - --upstream
    - p1.example:3001
    - --seed
    - random
    - --protocol
    - txsubmission
    - --cbor-shape
    - witness
    - --mutation-level
    - struct
    - --seed-tx
    - /corpus/cert-seed.cbor
    - --seed-tx
    - /corpus/meta-seed.cbor
    volumes:
    - ./corpus:/corpus:ro
    depends_on:
      configurator:
        condition: service_completed_successfully
      p1:
        condition: service_started
    restart: always
  decoder-fuzz:
    image: ghcr.io/j-gainsec/dwarf-adversary:0.19.0
    entrypoint: &id005
    - /usr/local/bin/dwarf-decoder-fuzz
    container_name: decoder-fuzz
    hostname: decoder-fuzz.example
    labels: &id006
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    command:
    - --target
    - tx
    - --corpus
    - /corpus
    - --level
    - semantic
    - --seed
    - random
    - --sdk
    - --iters
    - '999999999999'
    - --timeout-us
    - '2000000'
    restart: always
    depends_on: &id007
      configurator:
        condition: service_completed_successfully
  decoder-fuzz-applyblock:
    image: ghcr.io/j-gainsec/dwarf-adversary:0.19.0
    entrypoint:
    - /usr/local/bin/dwarf-decoder-fuzz
    container_name: decoder-fuzz-applyblock
    hostname: decoder-fuzz-applyblock.example
    environment:
      DWARF_GENESIS_DIR: /ledger-genesis
    labels:
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    command:
    - --target
    - applyblock
    - --corpus
    - /corpus-conway
    - --level
    - both
    - --seed
    - random
    - --sdk
    - --iters
    - '999999999999'
    - --timeout-us
    - '2000000'
    restart: always
    depends_on:
      configurator:
        condition: service_completed_successfully
  tx-generator:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/tx-generator:69bf815
    container_name: tx-generator
    hostname: tx-generator.example
    labels:
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    command:
    - --relay-socket
    - /state/node.socket
    - --control-socket
    - /state/tx-generator-control.sock
    - --state-dir
    - /state/txgen
    - --master-seed-file
    - /state/txgen/master.seed
    - --faucet-skey-file
    - /utxo-keys/genesis.1.skey
    - --network-magic
    - '42'
    volumes:
    - relay1-state:/state
    - utxo-keys:/utxo-keys:ro
    restart: always
    depends_on:
      relay1:
        condition: service_started
      configurator:
        condition: service_completed_successfully
  sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/sidecar:1ff6913
    environment:
      NETWORKMAGIC: 42
      PORT: 3001
      POOLS: '3'
    container_name: sidecar
    hostname: sidecar.example
    labels:
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    depends_on:
      tracer-sidecar:
        condition: service_started
    restart: always
    tmpfs:
    - /tmp
  adversary:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/adversary:5173fa8
    container_name: adversary
    hostname: adversary.example
    labels:
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    volumes:
    - tracer:/tracer:ro
    depends_on:
      tracer-sidecar:
        condition: service_started
      configurator:
        condition: service_completed_successfully
    restart: always
  tracer-sidecar:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/tracer-sidecar:8dbf509
    container_name: tracer-sidecar
    hostname: tracer-sidecar.example
    labels:
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    command:
    - /opt/cardano-tracer/logs
    environment:
      POOLS: '3'
      CHAINPOINT_FILEPATH: /opt/cardano-tracer/chainPoints.log
    volumes:
    - tracer:/opt/cardano-tracer
    restart: always
    depends_on:
      tracer:
        condition: service_started
  log-tailer:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/log-tailer@sha256:a5d23c42408a1003bb14208fd97dd2bdda102e7002e4e2a2804e71a80df56484
    container_name: log-tailer
    hostname: log-tailer.example
    volumes:
    - tracer:/tracer:ro
    restart: always
    depends_on:
      tracer:
        condition: service_started
  asteria-game:
    image: ghcr.io/cardano-foundation/cardano-node-antithesis/asteria-game:5252cad0
    container_name: asteria-game
    hostname: asteria-game.example
    labels:
      com.antithesis.exclude_from_faults: network,kill,pause,stop
    environment:
      INDEXER_SOCK: /tmp/idx.sock
      CARDANO_NODE_SOCKET_PATH: /state/node.socket
      NETWORK_MAGIC: '42'
    volumes:
    - relay1-state:/state:ro
    - utxo-keys:/utxo-keys:ro
    - asteria-game-db:/idx-db
    - asteria-deploy:/asteria-deploy
    tmpfs:
    - /tmp
    depends_on:
      relay1:
        condition: service_started
  decoder-fuzz-governance:
    image: ghcr.io/j-gainsec/dwarf-adversary:0.26.0
    entrypoint: *id005
    hostname: decoder-fuzz.example
    labels: *id006
    command:
    - --target
    - tx
    - --shape
    - governance
    - --corpus
    - /corpus-gov
    - --level
    - struct
    - --seed
    - random
    - --sdk
    - --iters
    - '999999999999'
    - --timeout-us
    - '2000000'
    restart: always
    depends_on: *id007
    volumes:
    - ./corpus-gov:/corpus-gov:ro
volumes:
  tracer: null
  p1-configs: null
  p2-configs: null
  p3-configs: null
  relay1-state: null
  relay2-state: null
  utxo-keys: null
  asteria-game-db: null
  asteria-deploy: null
networks:
  default:
    name: cardano-node-testnet
    driver: bridge
    internal: ${INTERNAL_NETWORK}
